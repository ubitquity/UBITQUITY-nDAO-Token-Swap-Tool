# UBITQUITY + nDAO Token Swap Tool — nginx Configuration
#
# No .htaccess needed. This nginx config handles:
# - Static file serving from dist/
# - PHP-FPM routing for /api/*
# - SPA fallback to serve.php (injects CSRF token)
# - Security headers
# - Aggressive caching for hashed assets
#
# Usage: Include this in your nginx server block or sites-available.

server {
    listen 80;
    listen [::]:80;
    server_name swap.example.com;

    # Redirect HTTP to HTTPS in production
    # return 301 https://$host$request_uri;

    root /var/www/swap-tool/dist;
    index index.html;

    # ─── Security Headers ────────────────────────────────────
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://proton.alcor.exchange https://proton.greymass.com https://xpr.eosusa.io https://api.protonnz.com https://explorer.xprnetwork.org; img-src 'self' data:; frame-ancestors 'none'" always;

    # ─── Block sensitive files ───────────────────────────────
    location ~ /\. {
        deny all;
        return 404;
    }

    location ~ \.(env|db|log|sqlite|sql)$ {
        deny all;
        return 404;
    }

    # ─── API routes → PHP-FPM ────────────────────────────────
    location /api/ {
        try_files $uri /api/index.php$is_args$args;

        location ~ \.php$ {
            fastcgi_pass unix:/run/php/php-fpm.sock;
            fastcgi_param SCRIPT_FILENAME /var/www/swap-tool/api/index.php;
            include fastcgi_params;
            fastcgi_param PATH_INFO $fastcgi_path_info;

            # Timeouts
            fastcgi_connect_timeout 10s;
            fastcgi_send_timeout 30s;
            fastcgi_read_timeout 30s;

            # Buffer
            fastcgi_buffer_size 16k;
            fastcgi_buffers 4 16k;
        }
    }

    # ─── Hashed static assets (immutable cache) ──────────────
    location ~* \.[a-f0-9]{8,}\.(js|css|svg|png|jpg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ─── Static assets ───────────────────────────────────────
    location ~* \.(js|css|svg|png|jpg|jpeg|gif|ico|woff|woff2|ttf|map)$ {
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    # ─── SPA fallback → PHP (CSRF injection) ─────────────────
    location / {
        try_files $uri $uri/ @spa;
    }

    location @spa {
        fastcgi_pass unix:/run/php/php-fpm.sock;
        fastcgi_param SCRIPT_FILENAME /var/www/swap-tool/serve.php;
        include fastcgi_params;
        fastcgi_param REQUEST_URI $request_uri;
    }

    # ─── Rate limiting zone (define in http block) ───────────
    # limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
    # Then in location /api/:  limit_req zone=api burst=10 nodelay;

    # ─── Gzip ────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml image/svg+xml;
    gzip_min_length 256;
    gzip_vary on;

    # ─── Logs ────────────────────────────────────────────────
    access_log /var/log/nginx/swap-tool-access.log;
    error_log  /var/log/nginx/swap-tool-error.log;
}
